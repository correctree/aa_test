<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>人物認識 背景スライドショー</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
  <style>
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      touch-action: manipulation;
    }
    #output { position: fixed; inset: 0; width: 100vw; height: 100dvh; background: #111; }
    #video {
      position: fixed; left: -9999px; top: -9999px;
      width: 1px; height: 1px; opacity: 0; pointer-events: none;
    }
    #startScreen {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center; padding: 24px;
      color: white; background: radial-gradient(circle at center, #2c3e50, #111);
      text-align: center;
    }
    .startCard {
      width: min(92vw, 430px); padding: 24px 20px; border-radius: 24px;
      background: rgba(0,0,0,0.44); backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .startCard h1 { margin: 0 0 12px; font-size: 21px; line-height: 1.35; }
    .startCard p { margin: 8px 0; font-size: 14px; line-height: 1.7; opacity: 0.9; }
    #startButton {
      margin-top: 16px; width: 100%; border: 0; border-radius: 999px;
      padding: 15px 18px; font-size: 17px; font-weight: 700;
      background: white; color: #111; cursor: pointer;
    }
    #status {
      margin-top: 14px; padding: 10px; border-radius: 12px;
      background: rgba(255,255,255,0.12); font-size: 13px; line-height: 1.55;
      word-break: break-word;
    }
    .panel {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      top: max(12px, env(safe-area-inset-top));
      z-index: 10; padding: 11px 12px; border-radius: 16px;
      color: white; background: rgba(0,0,0,0.48); backdrop-filter: blur(10px);
      font-size: 12px; line-height: 1.55; user-select: none;
      max-width: min(88vw, 340px);
    }
    .panel label { display: block; margin-top: 8px; }
    .panel input[type="file"] { width: 100%; max-width: 300px; font-size: 12px; }
    .panel input[type="range"] { width: 150px; vertical-align: middle; }
    .btnRow { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .smallButton {
      border: 0; border-radius: 999px;
      padding: 7px 12px; background: white; color: #111;
      cursor: pointer; font-size: 12px;
    }
    .smallButton.danger { background: #ff4444; color: white; }
    #savedCount { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .hint { margin-top: 6px; opacity: 0.76; font-size: 11px; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <canvas id="output"></canvas>

  <div id="startScreen">
    <div class="startCard">
      <h1>人物認識＋背景スライドショー</h1>
      <p>人物だけを認識し、背景を写真スライドショーに置き換えます。</p>
      <p>iPhone / iPadではSafariでHTTPSのURLとして開いてください。</p>
      <button id="startButton">カメラを開始</button>
      <div id="status">待機中</div>
    </div>
  </div>

  <div class="panel" id="panel" style="display:none;">
    <strong>背景スライドショー</strong>
    <label>写真を追加：<input id="fileInput" type="file" accept="image/*" multiple /></label>
    <div id="savedCount"></div>
    <label>切替：
      <input id="speed" type="range" min="1500" max="10000" value="4000" step="500" />
      <span id="speedText">4.0秒</span>
    </label>
    <label>輪郭：
      <input id="blur" type="range" min="0" max="10" value="3" step="1" />
      <span id="blurText">3</span>
    </label>
    <div class="btnRow">
      <button class="smallButton" id="hidePanel">UIを隠す</button>
      <button class="smallButton danger" id="clearSaved">写真をリセット</button>
    </div>
    <div class="hint">画面を3回タップするとUIを再表示します。</div>
  </div>

  <script>
    // ─────────────────────────────────────────
    // DOM refs
    // ─────────────────────────────────────────
    const video       = document.getElementById("video");
    const canvas      = document.getElementById("output");
    const ctx         = canvas.getContext("2d", { alpha: false });
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const statusEl    = document.getElementById("status");
    const panel       = document.getElementById("panel");
    const fileInput   = document.getElementById("fileInput");
    const speed       = document.getElementById("speed");
    const speedText   = document.getElementById("speedText");
    const blur        = document.getElementById("blur");
    const blurText    = document.getElementById("blurText");
    const hidePanel   = document.getElementById("hidePanel");
    const clearSaved  = document.getElementById("clearSaved");
    const savedCount  = document.getElementById("savedCount");

    // ─────────────────────────────────────────
    // オフスクリーン canvas（起動時に一括確保・再利用）
    // ─────────────────────────────────────────
    const personCanvas = document.createElement("canvas");
    const personCtx    = personCanvas.getContext("2d");

    // マスク処理用（CSS filter を使わずピクセル直操作）
    const maskCanvas   = document.createElement("canvas");
    const maskCtx      = maskCanvas.getContext("2d");

    // EMA（指数移動平均）平滑化マスク — Float32Array で保持
    let emaBuffer = null; // Float32Array, サイズ = w*h

    // ─────────────────────────────────────────
    // スライドショー
    // ─────────────────────────────────────────
    let slideImages    = [];   // {img, dataUrl} の配列
    let currentSlide   = 0;
    let nextSlide      = 0;
    let lastSwitchTime = performance.now();
    const fadeDuration = 800;

    // ─────────────────────────────────────────
    // その他状態
    // ─────────────────────────────────────────
    let segmentation  = null;
    let cameraRunning = false;
    let processing    = false;
    let lastFrameTime = 0;
    const targetFPS   = 24;

    // EMAの重み（0に近いほど前フレームを重視→ちらつき減・反応遅め）
    // 0.25 = 新フレーム25%、過去75% → かなり安定
    const EMA_ALPHA = 0.25;

    // マスクの二値化しきい値（0〜1）。高いほど輪郭が締まる
    const MASK_THRESHOLD = 0.50;

    const fallbackBackgrounds = [
      ["#1b2735","#090a0f"], ["#24404f","#7aa6b2"],
      ["#3b2557","#8d5b7a"], ["#164f55","#90ba8f"]
    ];

    // ─────────────────────────────────────────
    // Canvas リサイズ
    // ─────────────────────────────────────────
    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.floor(window.innerWidth  * dpr);
      const h = Math.floor(window.innerHeight * dpr);
      canvas.width  = w; canvas.height  = h;
      canvas.style.width  = window.innerWidth  + "px";
      canvas.style.height = window.innerHeight + "px";
      personCanvas.width = w; personCanvas.height = h;
      maskCanvas.width   = w; maskCanvas.height   = h;
      // EMAバッファはマスクサイズ基準でbuildMask内でリセット
      emaBuffer = null;
    }
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 250));
    resizeCanvas();

    // ─────────────────────────────────────────
    // UI イベント
    // ─────────────────────────────────────────
    function setStatus(msg) { statusEl.textContent = msg; }

    speed.addEventListener("input", () =>
      speedText.textContent = (Number(speed.value) / 1000).toFixed(1) + "秒");
    blur.addEventListener("input", () =>
      blurText.textContent = blur.value);
    hidePanel.addEventListener("click", () => panel.style.display = "none");

    clearSaved.addEventListener("click", () => {
      if (!confirm("保存した写真をすべて削除しますか？")) return;
      localStorage.removeItem("bgImages");
      for (const s of slideImages) if (s._objectUrl) URL.revokeObjectURL(s._objectUrl);
      slideImages = []; currentSlide = 0; nextSlide = 0;
      updateSavedCount();
    });

    let tapTimes = [];
    window.addEventListener("touchend", () => {
      const now = performance.now();
      tapTimes = tapTimes.filter(t => now - t < 700);
      tapTimes.push(now);
      if (tapTimes.length >= 3) {
        panel.style.display = panel.style.display === "none" ? "block" : "none";
        tapTimes = [];
      }
    });

    // ─────────────────────────────────────────
    // 写真の保存・読み込み（localStorage / Base64）
    // ─────────────────────────────────────────
    function updateSavedCount() {
      const n = slideImages.length;
      savedCount.textContent = n > 0 ? `📷 ${n}枚の写真が読み込まれています` : "写真が選択されていません";
    }

    // File → Base64 dataUrl
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // dataUrl → Image
    function dataUrlToImage(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = dataUrl;
      });
    }

    // localStorage に保存（容量超過時は古いものを除外）
    function saveToStorage(dataUrls) {
      try {
        localStorage.setItem("bgImages", JSON.stringify(dataUrls));
      } catch(e) {
        // 容量超過: 末尾から削って再試行
        console.warn("localStorage 容量超過。古い写真を減らします。");
        const trimmed = dataUrls.slice(-Math.max(1, dataUrls.length - 1));
        try { localStorage.setItem("bgImages", JSON.stringify(trimmed)); } catch(e2) {}
      }
    }

    // ページ起動時に保存済み写真を復元
    async function loadSavedImages() {
      try {
        const raw = localStorage.getItem("bgImages");
        if (!raw) return;
        const dataUrls = JSON.parse(raw);
        if (!Array.isArray(dataUrls) || dataUrls.length === 0) return;
        setStatus("保存済み写真を読み込み中...");
        const imgs = [];
        for (const url of dataUrls) {
          const img = await dataUrlToImage(url);
          if (img) imgs.push({ img, dataUrl: url });
        }
        slideImages = imgs;
        currentSlide = 0;
        nextSlide = imgs.length > 1 ? 1 : 0;
        lastSwitchTime = performance.now();
        updateSavedCount();
        setStatus("保存済み写真を復元しました ✓");
      } catch(e) {
        console.warn("写真の復元に失敗:", e);
      }
    }

    // ファイル選択時：既存に追加して保存
    fileInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      if (files.length === 0) return;

      setStatus("写真を読み込み中...");
      const newEntries = [];
      for (const file of files) {
        const dataUrl = await fileToDataUrl(file);
        const img = await dataUrlToImage(dataUrl);
        if (img) newEntries.push({ img, dataUrl });
      }

      // 既存に追加（重複なし）
      slideImages = [...slideImages, ...newEntries];
      currentSlide = 0;
      nextSlide = slideImages.length > 1 ? 1 : 0;
      lastSwitchTime = performance.now();
      updateSavedCount();

      // dataUrl 配列を localStorage に保存
      saveToStorage(slideImages.map(s => s.dataUrl));
      setStatus("写真を保存しました ✓");
      fileInput.value = "";
    });

    // ─────────────────────────────────────────
    // 背景描画
    // ─────────────────────────────────────────
    function drawCoverImage(targetCtx, img, x, y, w, h, alpha = 1) {
      if (!img || !img.width || !img.height) return;
      const imgRatio = img.width / img.height;
      const canRatio = w / h;
      let sx, sy, sw, sh;
      if (imgRatio > canRatio) {
        sh = img.height; sw = img.height * canRatio;
        sx = (img.width - sw) / 2; sy = 0;
      } else {
        sw = img.width; sh = img.width / canRatio;
        sx = 0; sy = (img.height - sh) / 2;
      }
      targetCtx.save();
      targetCtx.globalAlpha = alpha;
      targetCtx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      targetCtx.restore();
    }

    function drawFallbackBackground(now) {
      const index = Math.floor(now / Number(speed.value)) % fallbackBackgrounds.length;
      const [c0, c1] = fallbackBackgrounds[index];
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, c0); g.addColorStop(1, c1);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawSlideshowBackground(now) {
      if (slideImages.length === 0) { drawFallbackBackground(now); return; }
      const interval = Number(speed.value);
      if (now - lastSwitchTime > interval) {
        currentSlide = nextSlide;
        nextSlide = (nextSlide + 1) % slideImages.length;
        lastSwitchTime = now;
      }
      const fade = Math.min(1, (now - lastSwitchTime) / fadeDuration);
      drawCoverImage(ctx, slideImages[currentSlide].img, 0, 0, canvas.width, canvas.height, 1);
      if (slideImages.length > 1)
        drawCoverImage(ctx, slideImages[nextSlide].img, 0, 0, canvas.width, canvas.height, fade);
    }

    // ─────────────────────────────────────────
    // カメラ映像の描画（左右反転 + cover全画面）
    // ─────────────────────────────────────────
    function drawMirroredCover(targetCtx, source, cw, ch) {
      const srcW = video.videoWidth  || source.width  || cw;
      const srcH = video.videoHeight || source.height || ch;
      const vAR = srcW / srcH;
      const cAR = cw / ch;

      // 常にcoverで全画面（左右・上下が切れても画面を埋める）
      let dstW, dstH;
      if (vAR > cAR) { dstH = ch; dstW = ch * vAR; }
      else            { dstW = cw; dstH = cw / vAR; }
      const dstX = (cw - dstW) / 2;
      const dstY = (ch - dstH) / 2;

      targetCtx.save();
      targetCtx.translate(cw, 0);
      targetCtx.scale(-1, 1);
      targetCtx.drawImage(source, 0, 0, srcW, srcH, cw - dstX - dstW, dstY, dstW, dstH);
      targetCtx.restore();
    }

    // ─────────────────────────────────────────
    // マスク処理：EMA + ピクセル直操作（完全同期）
    // ─────────────────────────────────────────

    // EMA処理は軽量な固定サイズで行う（処理コスト削減・輪郭改善）
    const EMA_W = 256, EMA_H = 256;

    // EMA用キャンバス（縮小サイズ固定）
    const readCanvas = document.createElement("canvas");
    const readCtx    = readCanvas.getContext("2d", { willReadFrequently: true });
    readCanvas.width = EMA_W; readCanvas.height = EMA_H;

    function buildMask(segMask, cw, ch) {
      const srcW = video.videoWidth  || segMask.width  || cw;
      const srcH = video.videoHeight || segMask.height || ch;

      // 1. マスクをcoverで maskCanvas に描画（映像と同じ変換）
      const vAR = srcW / srcH;
      const cAR = cw / ch;
      let dstW, dstH;
      if (vAR > cAR) { dstH = ch; dstW = ch * vAR; }
      else            { dstW = cw; dstH = cw / vAR; }
      const dstX = (cw - dstW) / 2;
      const dstY = (ch - dstH) / 2;

      // 2. まず生マスクを小さいreadCanvasに描いてピクセル処理
      readCtx.clearRect(0, 0, EMA_W, EMA_H);
      readCtx.drawImage(segMask, 0, 0, EMA_W, EMA_H);
      const maskData = readCtx.getImageData(0, 0, EMA_W, EMA_H).data;

      // 3. しきい値で二値化（EMAなし＝タイムラグなし）
      //    侵食マージン: blurで端が溶けた分だけ内側に縮める
      const blurR = Math.max(0, Number(blur.value));
      const threshold = 0.55 + blurR * 0.03; // blurが強いほど閾値を上げて縁を削る
      const binary = new Uint8ClampedArray(EMA_W * EMA_H * 4);
      for (let i = 0; i < EMA_W * EMA_H; i++) {
        const raw = maskData[i * 4] / 255;
        const v = raw >= threshold ? 255 : 0;
        binary[i * 4 + 3] = v; // RGB=0のまま、アルファのみ
      }
      readCtx.putImageData(new ImageData(binary, EMA_W, EMA_H), 0, 0);

      // 4. maskCanvas にblur付きで描画（blurは輪郭をなじませる用途のみ）
      maskCtx.clearRect(0, 0, cw, ch);
      maskCtx.save();
      if (blurR > 0) {
        maskCtx.filter = `blur(${Math.round(blurR * 0.8)}px)`;
      }
      maskCtx.translate(cw, 0);
      maskCtx.scale(-1, 1);
      maskCtx.drawImage(readCanvas, 0, 0, EMA_W, EMA_H, cw - dstX - dstW, dstY, dstW, dstH);
      maskCtx.restore();
    }

    // ─────────────────────────────────────────
    // セグメンテーション結果のコールバック
    // ─────────────────────────────────────────
    function onResults(results) {
      const now = performance.now();
      const cw = canvas.width, ch = canvas.height;

      // マスク構築（EMA平滑化 + 二値化）
      buildMask(results.segmentationMask, cw, ch);

      // 背景
      ctx.clearRect(0, 0, cw, ch);
      drawSlideshowBackground(now);

      // 背景を少し暗くして人物を浮かせる
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, cw, ch);
      ctx.restore();

      // 人物を切り抜いて描画
      // 手順：①映像を描く → ②マスクをdestination-inで適用
      // （source-inより白縁が出にくい）
      personCtx.clearRect(0, 0, cw, ch);
      personCtx.save();
      drawMirroredCover(personCtx, results.image, cw, ch);
      personCtx.globalCompositeOperation = "destination-in";
      personCtx.drawImage(maskCanvas, 0, 0);
      personCtx.restore();

      ctx.drawImage(personCanvas, 0, 0);



      processing = false;
    }

    // ─────────────────────────────────────────
    // MediaPipe 初期化
    // ─────────────────────────────────────────
    async function prepareSegmentation() {
      if (segmentation) return segmentation;
      segmentation = new SelfieSegmentation({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
      });
      segmentation.setOptions({ modelSelection: 1, selfieMode: true });
      segmentation.onResults(onResults);
      return segmentation;
    }

    // ─────────────────────────────────────────
    // カメラ起動
    // ─────────────────────────────────────────
    function isSecureEnough() {
      return location.protocol === "https:" ||
             location.hostname === "localhost" ||
             location.hostname === "127.0.0.1";
    }

    async function startCamera() {
      startButton.disabled = true;
      setStatus("起動準備中...");

      if (!isSecureEnough()) {
        setStatus("カメラを使うにはHTTPSが必要です。GitHub Pages等にアップロードして https:// から開いてください。");
        startButton.disabled = false; return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus("このブラウザではカメラAPIが使えません。iPhone / iPadはSafariで開いてください。");
        startButton.disabled = false; return;
      }

      try {
        await prepareSegmentation();
        setStatus("カメラ許可を待っています...");
        let stream;
        try {
          // 縦向きを明示的にリクエスト（横長カメラ問題を回避）
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: "user",
              width:  { ideal: 480, max: 720 },
              height: { ideal: 640, max: 960 }
            }
          });
        } catch (_) {
          stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: true });
        }

        video.srcObject = stream;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.muted = true;

        await new Promise(resolve => {
          if (video.readyState >= 2) resolve();
          else video.onloadeddata = resolve;
        });
        await video.play();

        cameraRunning = true;
        startScreen.style.display = "none";
        panel.style.display = "block";
        requestAnimationFrame(processLoop);
      } catch (err) {
        startButton.disabled = false;
        if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError")
          setStatus("カメラ許可が拒否されました。Safari/Chromeの設定でカメラを許可してください。");
        else if (err.name === "NotFoundError" || err.name === "DevicesNotFoundError")
          setStatus("カメラが見つかりません。別のブラウザで試してください。");
        else if (err.name === "NotReadableError")
          setStatus("他のアプリがカメラを使用中の可能性があります。カメラアプリ等を閉じて再度試してください。");
        else
          setStatus("カメラ開始に失敗しました：" + err.name + " / " + err.message);
      }
    }

    // ─────────────────────────────────────────
    // メインループ
    // ─────────────────────────────────────────
    async function processLoop(now) {
      if (!cameraRunning) return;
      requestAnimationFrame(processLoop);
      if (processing) return;
      if (now - lastFrameTime < 1000 / targetFPS) return;
      if (video.readyState < 2) return;
      lastFrameTime = now;
      processing = true;
      try {
        await segmentation.send({ image: video });
      } catch (err) {
        console.error(err);
        processing = false;
      }
    }

    // ─────────────────────────────────────────
    // 起動シーケンス
    // ─────────────────────────────────────────
    startButton.addEventListener("click", startCamera);
    startButton.addEventListener("touchend", e => {
      e.preventDefault(); startCamera();
    }, { passive: false });

    function idleBackground(now) {
      if (!cameraRunning) {
        drawFallbackBackground(now);
        requestAnimationFrame(idleBackground);
      }
    }
    requestAnimationFrame(idleBackground);

    // 保存済み写真を復元
    loadSavedImages();
  </script>
</body>
</html>
