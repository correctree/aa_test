<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>人物認識 背景スライドショー</title>
  <!-- 新版 MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
  <style>
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      touch-action: manipulation;
    }
    #output { position: fixed; inset: 0; width: 100vw; height: 100dvh; background: #111; }
    #video {
      position: fixed; left: -9999px; top: -9999px;
      width: 1px; height: 1px; opacity: 0; pointer-events: none;
    }
    #startScreen {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center; padding: 24px;
      color: white; background: radial-gradient(circle at center, #2c3e50, #111);
      text-align: center;
    }
    .startCard {
      width: min(92vw, 430px); padding: 24px 20px; border-radius: 24px;
      background: rgba(0,0,0,0.44); backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .startCard h1 { margin: 0 0 12px; font-size: 21px; line-height: 1.35; }
    .startCard p  { margin: 8px 0; font-size: 14px; line-height: 1.7; opacity: 0.9; }
    #startButton {
      margin-top: 16px; width: 100%; border: 0; border-radius: 999px;
      padding: 15px 18px; font-size: 17px; font-weight: 700;
      background: white; color: #111; cursor: pointer;
    }
    #status {
      margin-top: 14px; padding: 10px; border-radius: 12px;
      background: rgba(255,255,255,0.12); font-size: 13px; line-height: 1.55;
      word-break: break-word;
    }
    .panel {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      top:  max(12px, env(safe-area-inset-top));
      z-index: 10; padding: 11px 12px; border-radius: 16px;
      color: white; background: rgba(0,0,0,0.48); backdrop-filter: blur(10px);
      font-size: 12px; line-height: 1.55; user-select: none;
      max-width: min(88vw, 340px);
    }
    .panel label { display: block; margin-top: 8px; }
    .panel input[type="file"]  { width: 100%; max-width: 300px; font-size: 12px; }
    .panel input[type="range"] { width: 150px; vertical-align: middle; }
    .btnRow { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .smallButton { border: 0; border-radius: 999px; padding: 7px 12px; background: white; color: #111; cursor: pointer; font-size: 12px; }
    .smallButton.danger { background: #ff4444; color: white; }
    #savedCount { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .hint { margin-top: 6px; opacity: 0.76; font-size: 11px; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <canvas id="output"></canvas>

  <div id="startScreen">
    <div class="startCard">
      <h1>人物認識＋背景スライドショー</h1>
      <p>人物だけを認識し、背景を写真スライドショーに置き換えます。</p>
      <p>iPhone / iPadではSafariでHTTPSのURLとして開いてください。</p>
      <button id="startButton">カメラを開始</button>
      <div id="status">待機中</div>
    </div>
  </div>

  <div class="panel" id="panel" style="display:none;">
    <strong>背景スライドショー</strong>
    <label>写真を追加：<input id="fileInput" type="file" accept="image/*" multiple /></label>
    <div id="savedCount"></div>
    <label>切替：
      <input id="speed" type="range" min="1500" max="10000" value="4000" step="500" />
      <span id="speedText">4.0秒</span>
    </label>
    <label>輪郭：
      <input id="blur" type="range" min="0" max="10" value="3" step="1" />
      <span id="blurText">3</span>
    </label>
    <div class="btnRow">
      <button class="smallButton" id="hidePanel">UIを隠す</button>
      <button class="smallButton danger" id="clearSaved">写真をリセット</button>
    </div>
    <div class="hint">画面を3回タップするとUIを再表示します。</div>
  </div>

  <script>
    // ─── DOM ────────────────────────────────────
    const video       = document.getElementById("video");
    const canvas      = document.getElementById("output");
    const ctx         = canvas.getContext("2d", { alpha: false });
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const statusEl    = document.getElementById("status");
    const panel       = document.getElementById("panel");
    const fileInput   = document.getElementById("fileInput");
    const speed       = document.getElementById("speed");
    const speedText   = document.getElementById("speedText");
    const blur        = document.getElementById("blur");
    const blurText    = document.getElementById("blurText");
    const hidePanel   = document.getElementById("hidePanel");
    const clearSaved  = document.getElementById("clearSaved");
    const savedCount  = document.getElementById("savedCount");

    // ─── オフスクリーンCanvas ───────────────────
    const personCanvas = document.createElement("canvas");
    const personCtx    = personCanvas.getContext("2d");
    const maskCanvas   = document.createElement("canvas");
    const maskCtx      = maskCanvas.getContext("2d");
    // マスク読み取り用（willReadFrequently で最適化）
    const readCanvas   = document.createElement("canvas");
    const readCtx      = readCanvas.getContext("2d", { willReadFrequently: true });

    // ─── スライドショー ─────────────────────────
    let slideImages    = [];
    let currentSlide   = 0, nextSlide = 0;
    let lastSwitchTime = performance.now();
    const fadeDuration = 800;

    // ─── 状態 ───────────────────────────────────
    let segmenter     = null;
    let cameraRunning = false;
    let rafId         = null;

    const fallbackBackgrounds = [
      ["#1b2735","#090a0f"], ["#24404f","#7aa6b2"],
      ["#3b2557","#8d5b7a"], ["#164f55","#90ba8f"]
    ];

    // ─── Canvas リサイズ ────────────────────────
    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.floor(window.innerWidth  * dpr);
      const h = Math.floor(window.innerHeight * dpr);
      canvas.width  = w; canvas.height  = h;
      canvas.style.width  = window.innerWidth  + "px";
      canvas.style.height = window.innerHeight + "px";
      personCanvas.width = w; personCanvas.height = h;
      maskCanvas.width   = w; maskCanvas.height   = h;
    }
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 250));
    resizeCanvas();

    // ─── UI イベント ─────────────────────────────
    function setStatus(msg) { statusEl.textContent = msg; }

    speed.addEventListener("input", () =>
      speedText.textContent = (Number(speed.value) / 1000).toFixed(1) + "秒");
    blur.addEventListener("input", () =>
      blurText.textContent = blur.value);
    hidePanel.addEventListener("click", () => panel.style.display = "none");

    clearSaved.addEventListener("click", () => {
      if (!confirm("保存した写真をすべて削除しますか？")) return;
      localStorage.removeItem("bgImages");
      slideImages = []; currentSlide = 0; nextSlide = 0;
      updateSavedCount();
    });

    let tapTimes = [];
    window.addEventListener("touchend", () => {
      const now = performance.now();
      tapTimes = tapTimes.filter(t => now - t < 700);
      tapTimes.push(now);
      if (tapTimes.length >= 3) {
        panel.style.display = panel.style.display === "none" ? "block" : "none";
        tapTimes = [];
      }
    });

    // ─── 写真の保存・読み込み ──────────────────
    function updateSavedCount() {
      const n = slideImages.length;
      savedCount.textContent = n > 0 ? `📷 ${n}枚の写真が読み込まれています` : "写真が選択されていません";
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function dataUrlToImage(dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = dataUrl;
      });
    }

    function saveToStorage(dataUrls) {
      try {
        localStorage.setItem("bgImages", JSON.stringify(dataUrls));
      } catch(e) {
        const trimmed = dataUrls.slice(-Math.max(1, dataUrls.length - 1));
        try { localStorage.setItem("bgImages", JSON.stringify(trimmed)); } catch(e2) {}
      }
    }

    async function loadSavedImages() {
      try {
        const raw = localStorage.getItem("bgImages");
        if (!raw) return;
        const dataUrls = JSON.parse(raw);
        if (!Array.isArray(dataUrls) || !dataUrls.length) return;
        setStatus("保存済み写真を読み込み中...");
        const imgs = [];
        for (const url of dataUrls) {
          const img = await dataUrlToImage(url);
          if (img) imgs.push({ img, dataUrl: url });
        }
        slideImages = imgs;
        currentSlide = 0; nextSlide = imgs.length > 1 ? 1 : 0;
        lastSwitchTime = performance.now();
        updateSavedCount();
        setStatus("保存済み写真を復元しました ✓");
      } catch(e) { console.warn("復元失敗:", e); }
    }

    fileInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      setStatus("写真を読み込み中...");
      const newEntries = [];
      for (const file of files) {
        const dataUrl = await fileToDataUrl(file);
        const img = await dataUrlToImage(dataUrl);
        if (img) newEntries.push({ img, dataUrl });
      }
      slideImages = [...slideImages, ...newEntries];
      currentSlide = 0; nextSlide = slideImages.length > 1 ? 1 : 0;
      lastSwitchTime = performance.now();
      updateSavedCount();
      saveToStorage(slideImages.map(s => s.dataUrl));
      setStatus("写真を保存しました ✓");
      fileInput.value = "";
    });

    // ─── 背景描画 ───────────────────────────────
    function drawCoverImage(tCtx, img, x, y, w, h, alpha = 1) {
      if (!img || !img.width) return;
      const ir = img.width / img.height, cr = w / h;
      let sx, sy, sw, sh;
      if (ir > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw) / 2; sy = 0; }
      else          { sw = img.width;  sh = sw / cr; sx = 0; sy = (img.height - sh) / 2; }
      tCtx.save();
      tCtx.globalAlpha = alpha;
      tCtx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      tCtx.restore();
    }

    function drawFallbackBg(now) {
      const idx = Math.floor(now / Number(speed.value)) % fallbackBackgrounds.length;
      const [c0, c1] = fallbackBackgrounds[idx];
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, c0); g.addColorStop(1, c1);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawSlideshowBg(now) {
      if (!slideImages.length) { drawFallbackBg(now); return; }
      const interval = Number(speed.value);
      if (now - lastSwitchTime > interval) {
        currentSlide = nextSlide;
        nextSlide = (nextSlide + 1) % slideImages.length;
        lastSwitchTime = now;
      }
      const fade = Math.min(1, (now - lastSwitchTime) / fadeDuration);
      drawCoverImage(ctx, slideImages[currentSlide].img, 0, 0, canvas.width, canvas.height);
      if (slideImages.length > 1)
        drawCoverImage(ctx, slideImages[nextSlide].img, 0, 0, canvas.width, canvas.height, fade);
    }

    // ─── カメラ映像 cover + 左右反転 ───────────
    function drawMirroredCover(tCtx, source, cw, ch) {
      const srcW = video.videoWidth  || source.width  || cw;
      const srcH = video.videoHeight || source.height || ch;
      const vAR = srcW / srcH, cAR = cw / ch;
      let dstW, dstH;
      if (vAR > cAR) { dstH = ch; dstW = ch * vAR; }
      else            { dstW = cw; dstH = cw / vAR; }
      const dstX = (cw - dstW) / 2, dstY = (ch - dstH) / 2;
      tCtx.save();
      tCtx.translate(cw, 0);
      tCtx.scale(-1, 1);
      tCtx.drawImage(source, 0, 0, srcW, srcH, cw - dstX - dstW, dstY, dstW, dstH);
      tCtx.restore();
    }

    // ─── マスク構築 ─────────────────────────────
    // 新版 tasks-vision は confidenceMasks[0] が Float32Array (0.0〜1.0)
    // 人物ピクセル = 1.0、背景 = 0.0
    function buildMask(confidenceMask, maskWidth, maskHeight, cw, ch) {
      const blurR = Math.max(0, Number(blur.value));

      // coverサイズ（映像と同じ変換）
      const srcW = video.videoWidth  || cw;
      const srcH = video.videoHeight || ch;
      const vAR  = srcW / srcH, cAR = cw / ch;
      let dstW, dstH;
      if (vAR > cAR) { dstH = ch; dstW = ch * vAR; }
      else            { dstW = cw; dstH = cw / vAR; }
      const dstX = (cw - dstW) / 2, dstY = (ch - dstH) / 2;

      // readCanvas にマスクデータをピクセル書き込み
      if (readCanvas.width !== maskWidth || readCanvas.height !== maskHeight) {
        readCanvas.width = maskWidth; readCanvas.height = maskHeight;
      }
      const imgData = readCtx.createImageData(maskWidth, maskHeight);
      const d = imgData.data;

      for (let i = 0; i < maskWidth * maskHeight; i++) {
        const raw = confidenceMask[i];           // 0.0〜1.0
        const a   = Math.pow(raw, 1.4);          // ガンマ補正で輪郭を内側に締める
        d[i * 4]     = 0;
        d[i * 4 + 1] = 0;
        d[i * 4 + 2] = 0;
        d[i * 4 + 3] = Math.min(255, Math.round(a * 255));
      }
      readCtx.putImageData(imgData, 0, 0);

      // maskCanvas に cover + 左右反転で描画
      maskCtx.clearRect(0, 0, cw, ch);
      maskCtx.save();
      if (blurR > 0) {
        maskCtx.filter = `blur(${Math.round(blurR * 0.5)}px)`;
      }
      maskCtx.translate(cw, 0);
      maskCtx.scale(-1, 1);
      maskCtx.drawImage(readCanvas, 0, 0, maskWidth, maskHeight,
        cw - dstX - dstW, dstY, dstW, dstH);
      maskCtx.restore();
    }

    // ─── メインレンダリングループ ───────────────
    // 新版 tasks-vision は segmentForVideo() を rAF 内で同期実行
    function renderLoop() {
      if (!cameraRunning) return;
      rafId = requestAnimationFrame(renderLoop);

      if (video.readyState < 2) return;

      const now = performance.now();
      const cw  = canvas.width, ch = canvas.height;

      // ── セグメンテーション実行（同期・コールバックなし）──
      let result;
      try {
        result = segmenter.segmentForVideo(video, now);
      } catch(e) {
        console.error("segmentForVideo error:", e);
        return;
      }

      // confidenceMasks[0] が人物マスク（Float32Array）
      const cm = result.confidenceMasks?.[0];
      if (!cm) return;

      const maskData   = cm.getAsFloat32Array();
      const maskWidth  = cm.width;
      const maskHeight = cm.height;

      // マスク構築
      buildMask(maskData, maskWidth, maskHeight, cw, ch);

      // 背景描画
      ctx.clearRect(0, 0, cw, ch);
      drawSlideshowBg(now);

      // 背景を暗くして人物を浮かせる
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, cw, ch);
      ctx.restore();

      // 人物を切り抜いて描画
      personCtx.globalCompositeOperation = "source-over";
      personCtx.clearRect(0, 0, cw, ch);
      drawMirroredCover(personCtx, video, cw, ch);
      personCtx.globalCompositeOperation = "destination-in";
      personCtx.drawImage(maskCanvas, 0, 0);
      personCtx.globalCompositeOperation = "source-over";

      ctx.drawImage(personCanvas, 0, 0);

      // メモリ解放
      cm.close();
    }

    // ─── セグメンター初期化 ─────────────────────
    async function prepareSegmenter() {
      if (segmenter) return;
      setStatus("AIモデルを読み込み中...");

      const { ImageSegmenter, FilesetResolver } = window;

      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      segmenter = await ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          // Googleの最新セルフィーセグメンターモデル（旧版より高精度）
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
          delegate: "GPU",   // WebGL/WebGPU で高速化
        },
        runningMode:       "VIDEO",
        outputCategoryMask:    false,
        outputConfidenceMasks: true,   // 確率マスク（0.0〜1.0）を使用
      });
    }

    // ─── カメラ起動 ─────────────────────────────
    function isSecureEnough() {
      return location.protocol === "https:" ||
             location.hostname === "localhost" ||
             location.hostname === "127.0.0.1";
    }

    async function startCamera() {
      startButton.disabled = true;
      setStatus("起動準備中...");

      if (!isSecureEnough()) {
        setStatus("カメラを使うにはHTTPSが必要です。GitHub Pages等にアップロードして https:// から開いてください。");
        startButton.disabled = false; return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus("このブラウザではカメラAPIが使えません。iPhone / iPadはSafariで開いてください。");
        startButton.disabled = false; return;
      }

      try {
        await prepareSegmenter();
        setStatus("カメラ許可を待っています...");

        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
          });
        } catch(_) {
          stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: true });
        }

        video.srcObject = stream;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.muted = true;

        await new Promise(resolve => {
          if (video.readyState >= 2) resolve();
          else video.onloadeddata = resolve;
        });
        await video.play();

        cameraRunning = true;
        startScreen.style.display = "none";
        panel.style.display = "block";
        renderLoop();

      } catch(err) {
        startButton.disabled = false;
        if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError")
          setStatus("カメラ許可が拒否されました。Safari/Chromeの設定でカメラを許可してください。");
        else if (err.name === "NotFoundError")
          setStatus("カメラが見つかりません。");
        else if (err.name === "NotReadableError")
          setStatus("他のアプリがカメラを使用中です。");
        else
          setStatus("カメラ開始に失敗しました：" + err.name + " / " + err.message);
      }
    }

    // ─── 起動 ───────────────────────────────────
    startButton.addEventListener("click", startCamera);
    startButton.addEventListener("touchend", e => {
      e.preventDefault(); startCamera();
    }, { passive: false });

    function idleBg(now) {
      if (!cameraRunning) { drawFallbackBg(now); requestAnimationFrame(idleBg); }
    }
    requestAnimationFrame(idleBg);

    loadSavedImages();
  </script>
</body>
</html>
